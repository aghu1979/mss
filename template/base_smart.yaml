# ----------------------------------------------------------
# 02. 后台隐式支撑组 (底层调度逻辑)
# ----------------------------------------------------------

# --- 💎 专线池 (SubPre) - Smart 模式 ---
- &Pre_Smart
  name: Pre-香港
  type: smart
  use: [SubPre]
  interval: 300
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  max-failed-times: 3
  url: "https://www.gstatic.com/generate_204"
  lazy: true
  hidden: true
  filter: '(?i)(?:港|香港|🇭🇰|HK|Hong\s?Kong)'
- <<: *Pre_Smart
  name: Pre-台湾
  filter: '(?i)(?:台|台湾|🇹🇼|TW|Taiwan)'
- <<: *Pre_Smart
  name: Pre-狮城
  filter: '(?i)(?:坡|新加坡|🇸🇬|SG|Singapore)'
- <<: *Pre_Smart
  name: Pre-日本
  filter: '(?i)(?:日|日本|🇯🇵|JP|Japan)'
- <<: *Pre_Smart
  name: Pre-美国
  filter: '(?i)(?:美|美国|🇺🇸|US|United\s?States|America)'

# --- ☁️ CF池 (SubCF) - Smart 模式 ---
- &CF_Smart
  name: CF-All
  type: smart
  use: [SubCF]
  interval: 300
  uselightgbm: true
  collectdata: false
  prefer-asn: true
  max-failed-times: 3
  url: "https://www.gstatic.com/generate_204"
  lazy: true
  hidden: true
- <<: *CF_Smart
  name: CF-香港
  filter: '(?i)(?:港|香港|🇭🇰|HK|Hong\s?Kong)'
- <<: *CF_Smart
  name: CF-台湾
  filter: '(?i)(?:台|台湾|🇹🇼|TW|Taiwan)'
- <<: *CF_Smart
  name: CF-狮城
  filter: '(?i)(?:坡|新加坡|🇸🇬|SG|Singapore)'
- <<: *CF_Smart
  name: CF-日本
  filter: '(?i)(?:日|日本|🇯🇵|JP|Japan)'
- <<: *CF_Smart
  name: CF-美国
  filter: '(?i)(?:美|美国|🇺🇸|US|United\s?States|America)'

# --- 🎁 免费池 (SubFree) - 暴力回退模式 (保证最后有网) ---
- name: Free-Fallback
  type: fallback
  use: [SubFree]
  url: "https://www.gstatic.com/generate_204"
  interval: 180
  lazy: true
  hidden: true

# --- 国内与基础分流 ---
- name: 江苏
  type: smart
  use: [BaiduProxy]
  interval: 300
  uselightgbm: true
  lazy: true
  hidden: true
  filter: '(?i)(?:南京|苏州)'
- name: 广东
  type: smart
  use: [BaiduProxy]
  interval: 300
  uselightgbm: true
  lazy: true
  hidden: true
  filter: '(?i)(?:广州|深圳)'
- name: 北京
  type: smart
  use: [BaiduProxy]
  interval: 300
  uselightgbm: true
  lazy: true
  hidden: true
  filter: '(?i)(?:北京|保定)'
- name: Location
  type: select
  proxies: [🟢 直连, 江苏, 广东, 北京]
- name: Domestic
  type: select
  proxies: [🟢 直连, 江苏, 广东, 北京]
  hidden: true
- name: WebRTC
  type: select
  proxies: [⛔️ 拒绝, ⭕️ DNS_Hijack, 🟢 直连]
- name: 🟢 直连
  type: select
  proxies: [DIRECT]
  udp: true
  hidden: true
- name: ⛔️ 拒绝
  type: select
  proxies: [REJECT]
  hidden: true
- name: ⭕️ DNS_Hijack
  type: select
  proxies: [REJECT]
  hidden: true

