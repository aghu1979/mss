name: 自动节点清洗与探活流水线

on:
  schedule:
    - cron: '0 20 * * *' 
  workflow_dispatch:      

jobs:
  build-and-clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. 签出主分支
      uses: actions/checkout@v4
      with:
        path: repo_main

    - name: 2. 签出源数据分支
      uses: actions/checkout@v4
      with:
        ref: sub
        path: repo_sub

    - name: 3. 签出发布分支
      uses: actions/checkout@v4
      with:
        ref: release
        path: repo_release

    - name: 4. 智能汇集数据到工作空间
      run: |
        mkdir -p repo_main/subs
        if [ -f "repo_sub/subs/SubFreeOrg.txt" ]; then
          cp repo_sub/subs/SubFreeOrg.txt repo_main/subs/
        elif [ -f "repo_sub/SubFreeOrg.txt" ]; then
          cp repo_sub/SubFreeOrg.txt repo_main/subs/
        fi
        cp repo_sub/subs/SubPreOrg.txt repo_main/subs/ 2>/dev/null || true
        cp repo_sub/SubPreOrg.txt repo_main/subs/ 2>/dev/null || true
        cp repo_sub/subs/SubCFOrg.txt repo_main/subs/ 2>/dev/null || true
        cp repo_sub/SubCFOrg.txt repo_main/subs/ 2>/dev/null || true
        cp repo_release/subs/blacklist.txt repo_main/subs/ 2>/dev/null || true

    - name: 5. 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 6. 缓存 GeoIP 数据库与 Mihomo 测试内核
      run: |
        cd repo_main
        wget -O GeoLite2-Country.mmdb https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb
        wget -O GeoLite2-ASN.mmdb https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb
        
        # 下载官方 Mihomo 内核作为 7 层测试引擎
        wget -O mihomo-linux-amd64.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.2/mihomo-linux-amd64-v1.18.2.gz
        gzip -d mihomo-linux-amd64.gz
        mv mihomo-linux-amd64 mihomo
        chmod +x mihomo

    - name: 7. 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install maxminddb pyyaml aiohttp requests

    - name: 8. 执行多态清洗大脑 (融合内核七层探活)
      working-directory: ./repo_main
      run: |
        python -u scripts/clean_nodes.py

    - name: 9. 推送多态产物至 release 分支
      run: |
        mkdir -p repo_release/subs
        cp repo_main/subs/Sub*.txt repo_release/subs/ 2>/dev/null || true
        cp repo_main/subs/Sub*.yaml repo_release/subs/ 2>/dev/null || true
        cp repo_main/subs/blacklist.txt repo_release/subs/ 2>/dev/null || true
        cp repo_main/README.md repo_release/ || true
        
        cd repo_release
        git config --global user.name "GitHub Actions - Cleaner"
        git config --global user.email "actions@github.com"
        
        git add subs/Sub*.txt subs/Sub*.yaml subs/blacklist.txt README.md
        git diff-index --quiet HEAD || git commit -m "⚡ 自动更新：节点清洗与七层探活完毕"
        git push origin release
